<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单流程系统 · 登录</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #0f1729 0%, #1a2744 50%, #0f1729 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-container {
    background: rgba(255,255,255,0.96);
    border-radius: 20px;
    padding: 48px 40px 40px;
    width: 400px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
  }
  .login-title {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-title .icon { font-size: 48px; display: block; margin-bottom: 12px; }
  .login-title h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1a2744;
    margin-bottom: 6px;
  }
  .login-title p {
    font-size: 14px;
    color: #8896ab;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #3d4a5c;
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e2e6ed;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #f8f9fb;
  }
  .form-group input:focus {
    border-color: #4f6ef7;
    box-shadow: 0 0 0 3px rgba(79,110,247,0.12);
    background: #fff;
  }
  .form-group input::placeholder { color: #b0baca; }
  .error-msg {
    color: #e74c3c;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    text-align: center;
    background: #fef2f2;
    padding: 10px 16px;
    border-radius: 8px;
  }
  .error-msg.show { display: block; }
  .login-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #4f6ef7 0%, #3b5bdb 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 12px rgba(79,110,247,0.3);
  }
  .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,110,247,0.4); }
  .login-btn:active { transform: translateY(0); }
  .login-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }
  .login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #b0baca;
  }
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 修改密码弹窗 */
  .modal-overlay {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    align-items: center; justify-content: center;
    z-index: 1000;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-box h3 { margin-bottom: 20px; font-size: 18px; color: #1a2744; }
  .modal-box .form-group { margin-bottom: 16px; }
  .modal-box .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .modal-box .btn-row button { flex: 1; padding: 11px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
  .modal-box .btn-primary { background: #4f6ef7; color: #fff; }
  .modal-box .btn-primary:hover { background: #3b5bdb; }
  .modal-box .hint { font-size: 13px; color: #8896ab; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="login-container" id="loginForm">
  <div class="login-title">
    <span class="icon">📋</span>
    <h1>订单流程管理系统</h1>
    <p>请登录以继续</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label>账号</label>
    <input type="text" id="username" placeholder="输入账号" autocomplete="username" autofocus>
  </div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="password" placeholder="输入密码" autocomplete="current-password">
  </div>

  <button class="login-btn" id="loginBtn" onclick="handleLogin()">登 录</button>

  <div class="login-footer">
    广东厚海锐膜新材料科技有限公司
  </div>
</div>

<!-- 修改密码弹窗 -->
<div class="modal-overlay" id="changePwdModal">
  <div class="modal-box">
    <h3>🔑 首次登录，请修改密码</h3>
    <p class="hint">为保障账号安全，首次登录需要设置新密码</p>
    <div class="form-group">
      <label>当前密码</label>
      <input type="password" id="cpOld" placeholder="输入当前密码">
    </div>
    <div class="form-group">
      <label>新密码</label>
      <input type="password" id="cpNew" placeholder="至少4位">
    </div>
    <div class="form-group">
      <label>确认新密码</label>
      <input type="password" id="cpConfirm" placeholder="再次输入新密码">
    </div>
    <div class="error-msg" id="cpError"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="handleChangePwd()">确认修改</button>
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
let pendingLoginData = null; // 存登录成功但需要改密的数据

// 回车登录
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const modal = document.getElementById('changePwdModal');
    if (modal.classList.contains('active')) {
      handleChangePwd();
    } else {
      handleLogin();
    }
  }
});

async function handleLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('errorMsg');

  if (!username || !password) {
    showError('请输入账号和密码');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>登录中...';
  errEl.classList.remove('show');

  try {
    const res = await fetch(API_BASE + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (data.code !== 0) {
      showError(data.msg || '登录失败');
      btn.disabled = false;
      btn.textContent = '登 录';
      return;
    }

    // 保存登录信息
    localStorage.setItem('order_flow_token', data.data.token);
    localStorage.setItem('order_flow_user', JSON.stringify(data.data.user));
    localStorage.setItem('order_flow_permissions', JSON.stringify(data.data.permissions));

    // 需要修改密码
    if (data.data.user.must_change_pwd) {
      pendingLoginData = data.data;
      document.getElementById('cpOld').value = password;
      document.getElementById('cpNew').value = '';
      document.getElementById('cpConfirm').value = '';
      document.getElementById('cpError').classList.remove('show');
      document.getElementById('changePwdModal').classList.add('active');
      btn.disabled = false;
      btn.textContent = '登 录';
      return;
    }

    // 直接跳转
    window.location.href = API_BASE + '/app';
  } catch (e) {
    showError('网络错误，请检查服务器是否启动');
    btn.disabled = false;
    btn.textContent = '登 录';
  }
}

async function handleChangePwd() {
  const oldPwd = document.getElementById('cpOld').value;
  const newPwd = document.getElementById('cpNew').value;
  const confirm = document.getElementById('cpConfirm').value;
  const errEl = document.getElementById('cpError');

  if (!oldPwd || !newPwd) { showCpError('请填写完整'); return; }
  if (newPwd.length < 4) { showCpError('密码至少4位'); return; }
  if (newPwd !== confirm) { showCpError('两次密码不一致'); return; }

  try {
    const res = await fetch(API_BASE + '/api/auth/change-password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem('order_flow_token')
      },
      body: JSON.stringify({ old_password: oldPwd, new_password: newPwd })
    });
    const data = await res.json();

    if (data.code !== 0) {
      showCpError(data.msg || '修改失败');
      return;
    }

    // 更新本地标识
    const user = JSON.parse(localStorage.getItem('order_flow_user') || '{}');
    user.must_change_pwd = false;
    localStorage.setItem('order_flow_user', JSON.stringify(user));

    document.getElementById('changePwdModal').classList.remove('active');
    window.location.href = API_BASE + '/app';
  } catch (e) {
    showCpError('网络错误');
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function showCpError(msg) {
  const el = document.getElementById('cpError');
  el.textContent = msg;
  el.classList.add('show');
}
</script>
</body>
</html>
